services:
  - type: web
    name: nigrogi-ai-facility
    env: python
    rootDir: flask_virtual_hospital
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FLASK_HOST
        value: 0.0.0.0
